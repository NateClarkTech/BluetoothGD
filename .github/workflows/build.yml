name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # godot-cpp compiles hundreds of large translation units; unlimited
  # parallelism exhausts the 7 GB Linux runner and the job is SIGTERM'd.
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  LINUX_DEBUG_SO: build/bin/libbluetooth_manager.linux.template_debug.x86_64.so
  WINDOWS_DEBUG_DLL: build/bin/libbluetooth_manager.windows.template_debug.x86_64.dll

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DGODOTCPP_TARGET=template_debug

      - name: Build extension
        run: cmake --build build --target bluetooth_manager --parallel ${{ env.CMAKE_BUILD_PARALLEL_LEVEL }}

      - name: Build unit tests
        run: cmake --build build --target bluetooth_manager_tests --parallel ${{ env.CMAKE_BUILD_PARALLEL_LEVEL }}

      - name: Run unit tests
        run: ./build/tests/bluetooth_manager_tests

      - name: Verify extension output
        run: |
          ls -lh "${{ env.LINUX_DEBUG_SO }}"
          ls -lh addons/bluetooth_gd/bin/libbluetooth_manager.linux.template_debug.x86_64.so
          ls -lh demo/addons/bluetooth_gd/bin/libbluetooth_manager.linux.template_debug.x86_64.so

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: bluetooth_manager-linux-debug
          path: ${{ env.LINUX_DEBUG_SO }}
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DGODOTCPP_TARGET=template_debug

      - name: Build extension
        run: cmake --build build --config Debug --target bluetooth_manager --parallel ${{ env.CMAKE_BUILD_PARALLEL_LEVEL }}

      - name: Build unit tests
        run: cmake --build build --config Debug --target bluetooth_manager_tests --parallel ${{ env.CMAKE_BUILD_PARALLEL_LEVEL }}

      - name: Run unit tests
        run: ./build/tests/Debug/bluetooth_manager_tests.exe

      - name: Verify extension output
        run: |
          Get-ChildItem "${{ env.WINDOWS_DEBUG_DLL }}"
          Get-ChildItem addons/bluetooth_gd/bin/libbluetooth_manager.windows.template_debug.x86_64.dll
          Get-ChildItem demo/addons/bluetooth_gd/bin/libbluetooth_manager.windows.template_debug.x86_64.dll

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: bluetooth_manager-windows-debug
          path: ${{ env.WINDOWS_DEBUG_DLL }}
          if-no-files-found: error